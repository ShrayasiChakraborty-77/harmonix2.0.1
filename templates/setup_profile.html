<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Profile - Harmonix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at bottom right, rgba(74, 20, 140, 0.7), #121212);
            padding: 20px;
        }
        .auth-container {
            max-width: 500px;
            width: 100%;
            padding: 30px;
            background: rgba(18, 18, 18, 0.92);
            border-radius: 18px;
            border: 1px solid rgba(255, 215, 0, 0.35);
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.9);
        }
        .auth-heading { text-align: center; color: #FFD700; margin-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; color: #ccc; margin-bottom: 5px; font-size: 0.9rem; }
        .form-control {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            box-sizing: border-box;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body class="login-page">
    <div class="auth-container">
        <h1 class="auth-heading">Complete Your Profile</h1>
        <p style="color: #888; text-align: center; margin-bottom: 25px;">
            Set your login details and music preferences.
        </p>

        <form method="POST" action="">
            <div class="form-group">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Choose a unique username" required>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Set a secure password" required>
            </div>
            <div class="form-group">
                <label class="form-label">Favourite Genres</label>
                <input type="text" name="favourite_genres" class="form-control" placeholder="e.g. Rock, Jazz, Lo-fi">
            </div>
            <div class="form-group">
                <label class="form-label">Favourite Artists</label>
                <input type="text" name="favourite_artists" class="form-control" placeholder="e.g. Pink Floyd, Daft Punk">
            </div>
            <button type="submit" class="btn-primary">Create Profile & Start</button>
        </form>
    </div>
</body>
</html>
