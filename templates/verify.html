<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - Harmonix</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at bottom right, rgba(74, 20, 140, 0.7), #121212);
        }
        .auth-container {
            max-width: 400px;
            width: 100%;
            padding: 30px;
            background: rgba(18, 18, 18, 0.92);
            border-radius: 18px;
            border: 1px solid rgba(255, 215, 0, 0.35);
            box-shadow: 0 22px 60px rgba(0, 0, 0, 0.9);
        }
        .auth-heading { text-align: center; color: #FFD700; margin-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-control {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #444;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            box-sizing: border-box;
            text-align: center;
            font-size: 1.5rem;
            letter-spacing: 5px;
        }
        .btn-primary {
            width: 100%;
            padding: 12px;
            background: #6c5ce7;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }
        .alert { padding: 10px; margin-bottom: 15px; border-radius: 6px; text-align: center; }
        .alert-danger { background: #d63031; color: white; }
    </style>
</head>
<body class="login-page">
    <div class="auth-container">
        <h1 class="auth-heading">Verify OTP</h1>
        <p style="color: #ccc; text-align: center; margin-bottom: 20px;">
            An OTP has been sent to your email address.
        </p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="">
            <div class="form-group">
                <input type="text" name="otp" class="form-control" placeholder="000000" required maxlength="6">
            </div>
            <button type="submit" class="btn-primary">Verify OTP</button>
        </form>
    </div>
</body>
</html>
